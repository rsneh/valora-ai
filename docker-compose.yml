services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: valora_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://valora_user:valora_password@db:5432/valora_db
      - GOOGLE_APPLICATION_CREDENTIALS=/app/secrets/gcp-service-account-key.json
      - FIREBASE_PROJECT_ID=aidsell-platform
      - GCS_BUCKET_NAME=aidsell-poc-product-images-a3ljgkntce
    depends_on:
      - db # Ensures the 'db' service is started before the 'backend' service
    restart: unless-stopped
    networks:
      - valora_network # Connects this service to the custom network

  # PostgreSQL Database Service
  db:
    image: postgres:16-alpine
    container_name: valora_db
    volumes:
      - valora_data:/var/lib/postgresql/data/ # Persists database data on the host machine using a named volume
    environment:
      - POSTGRES_USER=valora_user # Sets the PostgreSQL superuser
      - POSTGRES_PASSWORD=valora_password # Sets the password for the superuser
      - POSTGRES_DB=valora_db # Creates an initial database named 'aidsell_db'
    ports:
      - "5432:5432"
    networks:
      - valora_network

# Named Volumes
volumes:
  valora_data: # Defines a named volume for persistent PostgreSQL data

# Networks
networks:
  valora_network: # Defines a custom bridge network for services to communicate
    driver: bridge

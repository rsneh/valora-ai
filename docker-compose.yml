services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aidsell_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://aidsell_user:aidsell_password@db:5432/aidsell_db
      - GOOGLE_APPLICATION_CREDENTIALS=/app/secrets/gcp-service-account-key.json
      - FIREBASE_PROJECT_ID=aidsell-platform
      - GCS_BUCKET_NAME=aidsell-poc-product-images-a3ljgkntce
    depends_on:
      - db # Ensures the 'db' service is started before the 'backend' service
    restart: always
    networks:
      - aidsell_network # Connects this service to the custom network

  # PostgreSQL Database Service
  db:
    image: postgres:15-alpine
    container_name: aidsell_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/ # Persists database data on the host machine using a named volume
    environment:
      - POSTGRES_USER=aidsell_user # Sets the PostgreSQL superuser
      - POSTGRES_PASSWORD=aidsell_password # Sets the password for the superuser
      - POSTGRES_DB=aidsell_db # Creates an initial database named 'aidsell_db'
    ports:
      - "5432:5432"
    networks:
      - aidsell_network

# Named Volumes
volumes:
  postgres_data: # Defines a named volume for persistent PostgreSQL data

# Networks
networks:
  aidsell_network: # Defines a custom bridge network for services to communicate
    driver: bridge
